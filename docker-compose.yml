services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-social_hunter}
      POSTGRES_USER: ${POSTGRES_USER:-social_hunter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_dev_only_change_me}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./apps/api
    command: ["python", "-m", "social_hunter.worker"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
    environment:
      VITE_API_BASE_URL: ${API_PUBLIC_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    profiles: ["production"]
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/social-hunter.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web

  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

volumes:
  postgres-data:
